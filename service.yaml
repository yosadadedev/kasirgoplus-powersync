replication:
  connections:
    - type: postgresql
      uri: postgresql://powersync_repl:change_me@db-host:5432/kasirgoplus

storage:
  type: mongodb
  uri: mongodb://mongo:27017/powersync_storage

port: 8080

sync_config:
  path: sync-config.yaml

client_auth:
  audience: ['powersync']
  jwks:
    keys:
      - kty: oct
        alg: 'HS256'
        kid: 'kasirgo-hs256'
        k: 'replace_me_base64url'

system:
  logging:
    level: info
    format: text
